<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Monitor Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#e63946">
    <link rel="apple-touch-icon" href="icona.png">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.1/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root { --primary: #e63946; --secondary: #457b9d; --bg: #f4f6f9; --text: #1d3557; }
        
        /* Effetto sfumato ed elegante per lo sfondo */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; 
            padding: 15px; max-width: 500px; margin: auto; 
            background: linear-gradient(135deg, #f6f8fd 0%, #f1f3f6 100%); 
            color: var(--text); padding-bottom: 50px; 
            min-height: 100vh;
        }
        
        .header { text-align: center; margin-bottom: 25px; margin-top: 10px; animation: fadeInDown 0.6s ease-out; }
        .header h1 { margin: 0; font-size: 26px; color: var(--primary); text-shadow: 0 2px 4px rgba(230,57,70,0.15); }
        
        /* Card con ombre morbide e animazione di entrata */
        .card { 
            background: rgba(255, 255, 255, 0.95); 
            padding: 22px; border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.06); 
            margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.4); 
            backdrop-filter: blur(10px);
            animation: fadeInUp 0.6s ease-out backwards;
        }
        
        /* Ritardi per far apparire le card una dopo l'altra */
        .card:nth-child(2) { animation-delay: 0.1s; }
        .card:nth-child(3) { animation-delay: 0.2s; }
        .card:nth-child(4) { animation-delay: 0.3s; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        /* Input moderni con effetto Focus */
        input { 
            width: 100%; padding: 14px; margin: 5px 0 15px 0; box-sizing: border-box; 
            border: 2px solid #e2e8f0; border-radius: 10px; font-size: 16px; 
            background: #f8fafc; transition: all 0.3s ease; 
        }
        input:focus { outline: none; border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px rgba(230, 57, 70, 0.1); }
        
        /* Pulsanti con effetto Hover e Click */
        button { 
            width: 100%; padding: 16px; margin: 10px 0; background-color: var(--primary); 
            color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; 
            cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); 
            box-shadow: 0 6px 15px rgba(230, 57, 70, 0.3); 
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(230, 57, 70, 0.4); }
        button:active { transform: translateY(1px); box-shadow: 0 2px 10px rgba(230, 57, 70, 0.3); }
        
        .btn-secondary { background-color: var(--secondary); box-shadow: 0 6px 15px rgba(69, 123, 157, 0.3); }
        .btn-secondary:hover { box-shadow: 0 8px 20px rgba(69, 123, 157, 0.4); }
        .btn-export { background-color: #2a9d8f; box-shadow: 0 6px 15px rgba(42, 157, 143, 0.3); }
        .btn-export:hover { box-shadow: 0 8px 20px rgba(42, 157, 143, 0.4); }
        .btn-danger { background-color: #d90429; margin-top: 0; box-shadow: 0 6px 15px rgba(217, 4, 41, 0.3); }
        
        h2 { font-size: 18px; margin-top: 0; border-bottom: 2px solid #f1faee; padding-bottom: 12px; display: flex; align-items: center; gap: 8px; color: #1d3557;}
        #status { font-weight: bold; text-align: center; margin-top: 10px; font-size: 14px; height: 20px; transition: 0.3s;}
        
        /* Lista Dati */
        .report-item { 
            border-left: 5px solid #ced4da; padding: 12px 15px; margin-bottom: 12px; 
            background: #fff; border-radius: 0 10px 10px 0; font-size: 14px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.02); transition: 0.3s;
        }
        .report-item:hover { transform: translateX(3px); }
        .badge { padding: 5px 10px; border-radius: 20px; font-weight: 800; font-size: 11px; float: right; text-transform: uppercase; letter-spacing: 0.5px;}
        
        /* Box Medie */
        .stats-box { text-align: center; padding: 15px; background: #f1faee; border-radius: 12px; border: 1px solid rgba(42, 157, 143, 0.1);}
        .stats-box div { font-size: 28px; font-weight: 800; color: var(--text); margin-top: 5px;}
        .stats-box span { font-size: 12px; color: #2a9d8f; text-transform: uppercase; font-weight: bold; letter-spacing: 1px;}
        
        canvas { max-width: 100%; margin-top: 15px; background: transparent; }
        .chart-title { text-align: center; font-size: 14px; color: #6c757d; margin-top: 30px; margin-bottom: 5px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;}

        /* Animazioni CSS */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="header">
        <h1>❤️ My Heart Monitor</h1>
    </div>

    <div class="card" id="config-card" style="display:none;">
        <h2>⚙️ Configurazione</h2>
        <input type="text" id="username" placeholder="Username (es. marconeri70)">
        <input type="text" id="repo" placeholder="Repo (es. my-heart-monitor)">
        <input type="password" id="token" placeholder="Token GitHub">
        <button class="btn-secondary" onclick="salvaImpostazioni()">Salva Impostazioni</button>
    </div>

    <div class="card">
        <h2>📝 Nuova Misurazione</h2>
        <div class="grid-2">
            <div>
                <label style="font-size: 13px; font-weight: 700; color: #6c757d; margin-left: 5px;">Sistolica (MAX)</label>
                <input type="number" id="sis" placeholder="es. 120">
            </div>
            <div>
                <label style="font-size: 13px; font-weight: 700; color: #6c757d; margin-left: 5px;">Diastolica (MIN)</label>
                <input type="number" id="dia" placeholder="es. 80">
            </div>
        </div>
        <label style="font-size: 13px; font-weight: 700; color: #6c757d; margin-left: 5px;">Battiti (BPM)</label>
        <input type="number" id="bpm" placeholder="es. 70">
        <button onclick="inviaDati()">Salva Dati</button>
        <p id="status"></p>
    </div>

    <div class="card">
        <h2>📈 Analisi e Andamento</h2>
        <div class="grid-2" id="medie-box" style="margin-bottom: 15px;">
            <div class="stats-box"><span>Media MAX</span><div id="avg-max">-</div></div>
            <div class="stats-box"><span>Media MIN</span><div id="avg-min">-</div></div>
        </div>
        
        <div class="chart-title">Andamento nel tempo</div>
        <canvas id="myChart" style="margin-bottom: 20px;"></canvas> 
        
        <div class="chart-title">Distribuzione Esiti</div>
        <canvas id="pieChart" style="max-height: 240px;"></canvas> 
    </div>

    <div class="card">
        <h2>📋 Archivio Dati</h2>
        <button class="btn-secondary" onclick="caricaStorico()">🔄 Aggiorna Dati</button>
        
        <div class="grid-2" style="margin-top: 15px;">
            <button class="btn-export" onclick="scaricaPDF()">📄 Scarica PDF</button>
            <button class="btn-danger" onclick="azzeraArchivio()">🗑️ Azzera Tutto</button>
        </div>

        <div id="lista-storico" style="margin-top: 20px;"></div>
    </div>

    <script>
        // Registriamo il plugin per le percentuali
        Chart.register(ChartDataLabels);

        let appData = []; 
        let chartInstance = null;
        let pieChartInstance = null;

        window.onload = () => {
            const user = localStorage.getItem('gh_user');
            if(!user) {
                document.getElementById('config-card').style.display = 'block';
            } else {
                caricaStorico();
            }
        };

        function salvaImpostazioni() {
            localStorage.setItem('gh_user', document.getElementById('username').value.trim());
            localStorage.setItem('gh_repo', document.getElementById('repo').value.trim());
            localStorage.setItem('gh_token', document.getElementById('token').value.trim());
            document.getElementById('config-card').style.display = 'none';
            caricaStorico();
        }

        async function inviaDati() {
            const user = localStorage.getItem('gh_user');
            const repo = localStorage.getItem('gh_repo');
            const token = localStorage.getItem('gh_token');
            const sis = parseInt(document.getElementById('sis').value);
            const dia = parseInt(document.getElementById('dia').value);
            const bpm = parseInt(document.getElementById('bpm').value) || 0;
            const statusEl = document.getElementById('status');

            if (!user || !repo || !token) { statusEl.style.color='red'; statusEl.innerText = '⚠️ Configurazione mancante.'; return; }
            if (!sis || !dia) { statusEl.style.color='red'; statusEl.innerText = '⚠️ Inserisci MAX e MIN.'; return; }

            statusEl.style.color='#1d3557';
            statusEl.innerText = '⏳ Salvataggio in corso...';
            
            let label = "🟢 Normale";
            if (sis >= 135 || dia >= 85) label = "🔴 Alta";
            else if (sis <= 90 || dia <= 60) label = "🟡 Bassa";

            const data = new Date();
            const titolo = `Misurazione: ${data.toLocaleString('it-IT')}`;
            const corpo = `MAX: ${sis} | MIN: ${dia} | BPM: ${bpm}`;

            try {
                const response = await fetch(`https://api.github.com/repos/${user}/${repo}/issues`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: titolo, body: corpo, labels: [label] })
                });

                if (response.ok) {
                    statusEl.style.color = '#2a9d8f';
                    statusEl.innerText = '✅ Dato Salvato con successo!';
                    document.getElementById('sis').value = ''; document.getElementById('dia').value = ''; document.getElementById('bpm').value = '';
                    setTimeout(() => { statusEl.innerText = ''; }, 4000);
                    caricaStorico(); 
                } else {
                    statusEl.style.color = 'red'; statusEl.innerText = `❌ Errore API`;
                }
            } catch (error) { statusEl.style.color = 'red'; statusEl.innerText = `❌ Errore di rete`; }
        }

        async function caricaStorico() {
            const user = localStorage.getItem('gh_user');
            const repo = localStorage.getItem('gh_repo');
            const token = localStorage.getItem('gh_token');
            const listaEl = document.getElementById('lista-storico');

            if (!user || !repo || !token) return;
            listaEl.innerHTML = '<div style="text-align:center; padding: 20px;"><em>Sincronizzazione... ⏳</em></div>';

            try {
                const response = await fetch(`https://api.github.com/repos/${user}/${repo}/issues?state=open&per_page=100`, {
                    headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github.v3+json' }
                });
                
                if (!response.ok) throw new Error("Errore API");
                const issues = await response.json();

                appData = []; 
                let htmlContent = '';
                let sumMax = 0, sumMin = 0, count = 0;

                issues.forEach(issue => {
                    if (issue.pull_request) return; 
                    
                    const labelName = issue.labels.length > 0 ? issue.labels[0].name : 'N/D';
                    const dataTitolo = issue.title.replace('Misurazione: ', '').trim();
                    
                    const matchMax = issue.body.match(/(?:MAX|Sistolica).*?(\d+)/i);
                    const matchMin = issue.body.match(/(?:MIN|Diastolica).*?(\d+)/i);
                    const matchBpm = issue.body.match(/(?:BPM|Battiti).*?(\d+)/i);

                    const max = matchMax ? parseInt(matchMax[1]) : 0;
                    const min = matchMin ? parseInt(matchMin[1]) : 0;
                    const bpm = matchBpm ? parseInt(matchBpm[1]) : 0;

                    if(max > 0 && min > 0) {
                        appData.push({ number: issue.number, data: dataTitolo, max, min, bpm, label: labelName, rawDate: new Date(issue.created_at) });
                        sumMax += max; sumMin += min; count++;
                    }

                    let color = labelName.includes('Alta') ? '#e63946' : (labelName.includes('Bassa') ? '#e9c46a' : '#2a9d8f');
                    
                    htmlContent += `
                    <div class="report-item" style="border-left-color: ${color}">
                        <span class="badge" style="background: ${color}20; color: ${color};">${labelName}</span>
                        <strong>${dataTitolo}</strong><br>
                        <div style="margin-top: 5px; color: #457b9d;">
                            Sistolica: <b>${max}</b> | Diastolica: <b>${min}</b> ${bpm ? `| BPM: <b>${bpm}</b>` : ''}
                        </div>
                    </div>`;
                });

                if (appData.length === 0) {
                    listaEl.innerHTML = '<div style="text-align:center; padding: 20px; color: #6c757d;">Archivio vuoto. Inizia a misurare!</div>';
                    document.getElementById('avg-max').innerText = '-';
                    document.getElementById('avg-min').innerText = '-';
                    if(chartInstance) chartInstance.destroy();
                    if(pieChartInstance) pieChartInstance.destroy();
                    return;
                }

                listaEl.innerHTML = htmlContent;
                document.getElementById('avg-max').innerText = Math.round(sumMax / count);
                document.getElementById('avg-min').innerText = Math.round(sumMin / count);

                appData.sort((a, b) => a.rawDate - b.rawDate);
                disegnaGrafico();

            } catch (error) {
                listaEl.innerHTML = '<div style="text-align:center; color: red;">❌ Impossibile caricare i dati.</div>';
            }
        }

        function disegnaGrafico() {
            const ctx = document.getElementById('myChart').getContext('2d');
            const ctxPie = document.getElementById('pieChart').getContext('2d');
            
            const labels = appData.map(d => d.data.split(',')[0]); 
            const dataMax = appData.map(d => d.max);
            const dataMin = appData.map(d => d.min);

            if(chartInstance) chartInstance.destroy(); 
            if(pieChartInstance) pieChartInstance.destroy();

            // 1. Grafico a Linee (Riattivate le animazioni!)
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Sistolica (MAX)', data: dataMax, borderColor: '#e63946', backgroundColor: 'rgba(230,57,70,0.1)', tension: 0.4, fill: true, pointBackgroundColor: '#e63946' },
                        { label: 'Diastolica (MIN)', data: dataMin, borderColor: '#457b9d', backgroundColor: 'rgba(69,123,157,0.1)', tension: 0.4, fill: true, pointBackgroundColor: '#457b9d' }
                    ]
                },
                options: { 
                    responsive: true, 
                    // Animazioni di default Chart.js attive
                    plugins: { 
                        legend: { position: 'top' },
                        datalabels: { display: false } // Spegne i numeri sulle linee per non fare confusione
                    },
                    scales: { y: { suggestedMin: 50, suggestedMax: 160 } }
                }
            });

            // Calcolo dati per la Torta
            let countAlta = 0, countNormale = 0, countBassa = 0;
            appData.forEach(d => {
                if(d.label.includes('Alta')) countAlta++;
                else if(d.label.includes('Bassa')) countBassa++;
                else countNormale++;
            });

            // 2. Grafico a Torta con PERCENTUALI!
            pieChartInstance = new Chart(ctxPie, {
                type: 'doughnut',
                data: {
                    labels: ['Alta', 'Normale', 'Bassa'],
                    datasets: [{
                        data: [countAlta, countNormale, countBassa],
                        backgroundColor: ['#e63946', '#2a9d8f', '#e9c46a'],
                        borderWidth: 3,
                        borderColor: '#ffffff',
                        hoverOffset: 10
                    }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    cutout: '60%', // Fa un buco più largo ed elegante in mezzo
                    plugins: { 
                        legend: { position: 'bottom' },
                        datalabels: {
                            color: '#ffffff',
                            font: { weight: 'bold', size: 16 },
                            formatter: (value, context) => {
                                // Se il valore è zero, nasconde l'etichetta
                                if (value === 0) return null;
                                // Calcola la percentuale
                                let sum = 0;
                                let dataArr = context.chart.data.datasets[0].data;
                                dataArr.map(data => { sum += data; });
                                let percentage = Math.round((value * 100) / sum) + "%";
                                return percentage;
                            }
                        }
                    } 
                }
            });
        }

        async function azzeraArchivio() {
            if (appData.length === 0) return;
            const conferma = confirm("⚠️ ATTENZIONE: Sei sicuro di voler azzerare l'archivio? \nL'operazione chiuderà i record correnti e ripartirai da zero.");
            if (!conferma) return;

            const user = localStorage.getItem('gh_user');
            const repo = localStorage.getItem('gh_repo');
            const token = localStorage.getItem('gh_token');
            const listaEl = document.getElementById('lista-storico');

            listaEl.innerHTML = '<div style="text-align:center; padding: 20px;"><em>Azzeramento in corso... non chiudere l\'app. ⏳</em></div>';

            try {
                for (let record of appData) {
                    await fetch(`https://api.github.com/repos/${user}/${repo}/issues/${record.number}`, {
                        method: 'PATCH',
                        headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                        body: JSON.stringify({ state: 'closed' })
                    });
                }
                alert("✅ Archivio azzerato con successo!");
                caricaStorico();
            } catch (error) {
                alert("❌ Errore durante l'azzeramento.");
                caricaStorico();
            }
        }

        function scaricaPDF() {
            if(appData.length === 0) { alert("Nessun dato da esportare!"); return; }

            const btn = document.querySelector('.btn-export');
            btn.innerText = "⏳ Creazione PDF in corso...";

            setTimeout(() => {
                try {
                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF();

                    doc.setFontSize(22);
                    doc.setTextColor(230, 57, 70);
                    doc.text("Referto Medico - Andamento Pressorio", 105, 20, { align: "center" });
                    
                    doc.setFontSize(10);
                    doc.setTextColor(100, 100, 100);
                    doc.text(`Generato il: ${new Date().toLocaleDateString('it-IT')}`, 105, 28, { align: "center" });

                    doc.setFontSize(14);
                    doc.setTextColor(29, 53, 87);
                    doc.text("Riepilogo Generale", 14, 45);
                    
                    doc.setFontSize(12);
                    doc.setTextColor(50, 50, 50);
                    const avgMax = document.getElementById('avg-max').innerText;
                    const avgMin = document.getElementById('avg-min').innerText;
                    doc.text(`- Media Sistolica (MAX): ${avgMax}`, 14, 55);
                    doc.text(`- Media Diastolica (MIN): ${avgMin}`, 14, 62);
                    doc.text(`- Misurazioni Totali: ${appData.length}`, 14, 69);

                    // Forziamo lo sfondo bianco per il canvas prima di fotografarlo per il PDF
                    const canvasLine = document.getElementById('myChart');
                    const canvasPie = document.getElementById('pieChart');
                    
                    // Salviamo le immagini per il PDF (Dato che ora aspettiamo il click dell'utente, l'animazione sarà già conclusa!)
                    const imgLine = canvasLine.toDataURL('image/png', 1.0);
                    const imgPie = canvasPie.toDataURL('image/png', 1.0);
                    
                    doc.addImage(imgLine, 'PNG', 14, 80, 180, 80);
                    doc.addImage(imgPie, 'PNG', 70, 165, 70, 70);

                    const tableData = [...appData].sort((a, b) => b.rawDate - a.rawDate).map(row => {
                        let labelPulita = row.label.replace(/[^a-zA-Z\s]/g, '').trim(); 
                        return [row.data, row.max, row.min, row.bpm, labelPulita];
                    });

                    doc.autoTable({
                        startY: 245,
                        head: [['Data e Ora', 'Sistolica', 'Diastolica', 'BPM', 'Esito']],
                        body: tableData,
                        theme: 'grid',
                        headStyles: { fillColor: [42, 157, 143] },
                        styles: { halign: 'center' }
                    });

                    doc.save(`Referto_Cardiologo_${new Date().toLocaleDateString('it-IT').replace(/\//g, '-')}.pdf`);
                    btn.innerText = "📄 Scarica PDF"; 

                } catch(error) {
                    alert("Errore nella generazione del PDF: " + error.message);
                    btn.innerText = "📄 Scarica PDF";
                }
            }, 500);
        }
    </script>
</body>
</html>
