<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Heart Monitor Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff416c">
    <link rel="apple-touch-icon" href="icona.png">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.1/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root { 
            --primary-grad: linear-gradient(135deg, #ff4b2b, #ff416c);
            --secondary-grad: linear-gradient(135deg, #36D1DC, #5B86E5);
            --export-grad: linear-gradient(135deg, #11998e, #38ef7d);
            --danger-grad: linear-gradient(135deg, #ED213A, #93291E);
            --bg-color: #f4f7f6;
            --text-main: #2b2d42;
            --text-muted: #8d99ae;
        }
        
        /* Sfondo animato super elegante */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            padding: 15px; max-width: 500px; margin: auto; 
            background: linear-gradient(-45deg, #f3e7e9, #e3eeff, #f3e7e9);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-main); padding-bottom: 50px; 
            min-height: 100vh;
        }
        
        /* Animazione Sfondo */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .header { text-align: center; margin-bottom: 25px; margin-top: 15px; animation: fadeInDown 0.8s cubic-bezier(0.25, 1, 0.5, 1); }
        .header h1 { margin: 0; font-size: 28px; font-weight: 800; color: #ff416c; letter-spacing: -0.5px; }
        
        /* IL CUORE CHE PULSA */
        .heart-icon {
            display: inline-block;
            animation: heartbeat 1.2s infinite;
            filter: drop-shadow(0 0 8px rgba(255, 65, 108, 0.5));
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.25); }
            28% { transform: scale(1); }
            42% { transform: scale(1.25); }
            70% { transform: scale(1); }
        }

        /* Effetto Glassmorphism per le Card */
        .card { 
            background: rgba(255, 255, 255, 0.75); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 24px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05), inset 0 1px 0 rgba(255,255,255,0.8); 
            margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.4); 
            animation: fadeInUp 0.8s cubic-bezier(0.25, 1, 0.5, 1) backwards;
        }
        
        .card:nth-child(2) { animation-delay: 0.1s; }
        .card:nth-child(3) { animation-delay: 0.2s; }
        .card:nth-child(4) { animation-delay: 0.3s; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        /* Input moderni in stile Neumorfismo leggero */
        input { 
            width: 100%; padding: 15px; margin: 8px 0 18px 0; box-sizing: border-box; 
            border: none; border-radius: 12px; font-size: 16px; font-weight: 500;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.03), 0 1px 0 rgba(255,255,255,1);
            color: var(--text-main);
            transition: all 0.3s ease; 
        }
        input:focus { 
            outline: none; 
            background: #fff; 
            box-shadow: 0 0 0 3px rgba(255, 65, 108, 0.2), inset 0 1px 2px rgba(0,0,0,0.02); 
            transform: translateY(-2px);
        }
        input::placeholder { color: #adb5bd; font-weight: 400;}

        /* Etichette degli input */
        .input-label { font-size: 12px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-left: 5px; }

        /* Pulsanti WOW */
        button { 
            width: 100%; padding: 16px; margin: 10px 0; 
            background: var(--primary-grad); 
            color: white; border: none; border-radius: 14px; font-size: 16px; font-weight: 800; 
            letter-spacing: 0.5px; text-transform: uppercase;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); 
            box-shadow: 0 8px 20px rgba(255, 65, 108, 0.3); 
            position: relative; overflow: hidden;
        }
        button:hover { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(255, 65, 108, 0.4); }
        button:active { transform: translateY(1px); box-shadow: 0 4px 10px rgba(255, 65, 108, 0.3); }
        
        .btn-secondary { background: var(--secondary-grad); box-shadow: 0 8px 20px rgba(91, 134, 229, 0.3); }
        .btn-secondary:hover { box-shadow: 0 12px 25px rgba(91, 134, 229, 0.4); }
        .btn-export { background: var(--export-grad); box-shadow: 0 8px 20px rgba(56, 239, 125, 0.3); }
        .btn-export:hover { box-shadow: 0 12px 25px rgba(56, 239, 125, 0.4); }
        .btn-danger { background: var(--danger-grad); margin-top: 0; box-shadow: 0 8px 20px rgba(237, 33, 58, 0.3); }
        .btn-danger:hover { box-shadow: 0 12px 25px rgba(237, 33, 58, 0.4); }

        h2 { font-size: 18px; margin-top: 0; border-bottom: 2px solid rgba(0,0,0,0.05); padding-bottom: 12px; display: flex; align-items: center; gap: 8px; color: var(--text-main); font-weight: 800;}
        #status { font-weight: bold; text-align: center; margin-top: 10px; font-size: 14px; height: 20px; transition: 0.3s;}
        
        /* Lista Dati Ridisegnata */
        .report-item { 
            border-left: 6px solid #ced4da; padding: 15px; margin-bottom: 15px; 
            background: rgba(255,255,255,0.8); border-radius: 0 12px 12px 0; font-size: 14px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.03); transition: 0.3s;
        }
        .report-item:hover { transform: translateX(5px); background: #fff;}
        .badge { padding: 6px 12px; border-radius: 20px; font-weight: 800; font-size: 11px; float: right; text-transform: uppercase; letter-spacing: 0.5px;}
        
        /* Box Medie WOW */
        .stats-box { 
            text-align: center; padding: 20px 10px; 
            background: linear-gradient(135deg, #ffffff, #f8f9fa); 
            border-radius: 16px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.04), inset 0 1px 0 #fff;
            border: 1px solid rgba(0,0,0,0.02);
            transition: 0.3s;
        }
        .stats-box:hover { transform: translateY(-5px); box-shadow: 0 12px 25px rgba(0,0,0,0.08); }
        .stats-box div { font-size: 32px; font-weight: 900; background: var(--primary-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-top: 5px;}
        .stats-box span { font-size: 12px; color: var(--text-muted); text-transform: uppercase; font-weight: 800; letter-spacing: 1px;}
        
        canvas { max-width: 100%; margin-top: 15px; background: transparent; }
        .chart-title { text-align: center; font-size: 12px; color: var(--text-muted); margin-top: 30px; margin-bottom: 5px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px;}

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="header">
        <h1><span class="heart-icon">❤️</span> My Heart Monitor</h1>
    </div>

    <div class="card" id="config-card" style="display:none;">
        <h2>⚙️ Configurazione</h2>
        <input type="text" id="username" placeholder="Username (es. marconeri70)">
        <input type="text" id="repo" placeholder="Repo (es. my-heart-monitor)">
        <input type="password" id="token" placeholder="Token GitHub">
        <button class="btn-secondary" onclick="salvaImpostazioni()">Salva Impostazioni</button>
    </div>

    <div class="card">
        <h2>📝 Nuova Misurazione</h2>
        <div class="grid-2">
            <div>
                <div class="input-label">Sistolica (MAX)</div>
                <input type="number" id="sis" placeholder="es. 120">
            </div>
            <div>
                <div class="input-label">Diastolica (MIN)</div>
                <input type="number" id="dia" placeholder="es. 80">
            </div>
        </div>
        <div class="input-label">Battiti al minuto (BPM)</div>
        <input type="number" id="bpm" placeholder="es. 70">
        <button onclick="inviaDati()">Salva Dati</button>
        <p id="status"></p>
    </div>

    <div class="card">
        <h2>📈 Analisi e Andamento</h2>
        <div class="grid-2" id="medie-box" style="margin-bottom: 15px;">
            <div class="stats-box"><span>Media MAX</span><div id="avg-max">-</div></div>
            <div class="stats-box"><span>Media MIN</span><div id="avg-min">-</div></div>
        </div>
        
        <div class="chart-title">Andamento nel tempo</div>
        <canvas id="myChart" style="margin-bottom: 20px;"></canvas> 
        
        <div class="chart-title">Distribuzione Esiti</div>
        <canvas id="pieChart" style="max-height: 240px;"></canvas> 
    </div>

    <div class="card">
        <h2>📋 Archivio Dati</h2>
        <button class="btn-secondary" onclick="caricaStorico()">🔄 Aggiorna Dati</button>
        
        <div class="grid-2" style="margin-top: 15px;">
            <button class="btn-export" onclick="scaricaPDF()">📄 Scarica PDF</button>
            <button class="btn-danger" onclick="azzeraArchivio()">🗑️ Azzera Tutto</button>
        </div>

        <div id="lista-storico" style="margin-top: 20px;"></div>
    </div>

    <script>
        Chart.register(ChartDataLabels);

        let appData = []; 
        let chartInstance = null;
        let pieChartInstance = null;

        window.onload = () => {
            const user = localStorage.getItem('gh_user');
            if(!user) {
                document.getElementById('config-card').style.display = 'block';
            } else {
                caricaStorico();
            }
        };

        function salvaImpostazioni() {
            localStorage.setItem('gh_user', document.getElementById('username').value.trim());
            localStorage.setItem('gh_repo', document.getElementById('repo').value.trim());
            localStorage.setItem('gh_token', document.getElementById('token').value.trim());
            document.getElementById('config-card').style.display = 'none';
            caricaStorico();
        }

        async function inviaDati() {
            const user = localStorage.getItem('gh_user');
            const repo = localStorage.getItem('gh_repo');
            const token = localStorage.getItem('gh_token');
            const sis = parseInt(document.getElementById('sis').value);
            const dia = parseInt(document.getElementById('dia').value);
            const bpm = parseInt(document.getElementById('bpm').value) || 0;
            const statusEl = document.getElementById('status');

            if (!user || !repo || !token) { statusEl.style.color='#ED213A'; statusEl.innerText = '⚠️ Configurazione mancante.'; return; }
            if (!sis || !dia) { statusEl.style.color='#ED213A'; statusEl.innerText = '⚠️ Inserisci MAX e MIN.'; return; }

            statusEl.style.color='#2b2d42';
            statusEl.innerText = '⏳ Salvataggio in corso...';
            
            let label = "🟢 Normale";
            if (sis >= 135 || dia >= 85) label = "🔴 Alta";
            else if (sis <= 90 || dia <= 60) label = "🟡 Bassa";

            const data = new Date();
            const titolo = `Misurazione: ${data.toLocaleString('it-IT')}`;
            const corpo = `MAX: ${sis} | MIN: ${dia} | BPM: ${bpm}`;

            try {
                const response = await fetch(`https://api.github.com/repos/${user}/${repo}/issues`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: titolo, body: corpo, labels: [label] })
                });

                if (response.ok) {
                    statusEl.style.color = '#11998e';
                    statusEl.innerText = '✅ Dato Salvato con successo!';
                    document.getElementById('sis').value = ''; document.getElementById('dia').value = ''; document.getElementById('bpm').value = '';
                    setTimeout(() => { statusEl.innerText = ''; }, 4000);
                    caricaStorico(); 
                } else {
                    statusEl.style.color = '#ED213A'; statusEl.innerText = `❌ Errore API`;
                }
            } catch (error) { statusEl.style.color = '#ED213A'; statusEl.innerText = `❌ Errore di rete`; }
        }

        async function caricaStorico() {
            const user = localStorage.getItem('gh_user');
            const repo = localStorage.getItem('gh_repo');
            const token = localStorage.getItem('gh_token');
            const listaEl = document.getElementById('lista-storico');

            if (!user || !repo || !token) return;
            listaEl.innerHTML = '<div style="text-align:center; padding: 20px; font-weight:bold;"><em>Sincronizzazione... ⏳</em></div>';

            try {
                const response = await fetch(`https://api.github.com/repos/${user}/${repo}/issues?state=open&per_page=100`, {
                    headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github.v3+json' }
                });
                
                if (!response.ok) throw new Error("Errore API");
                const issues = await response.json();

                appData = []; 
                let htmlContent = '';
                let sumMax = 0, sumMin = 0, count = 0;

                issues.forEach(issue => {
                    if (issue.pull_request) return; 
                    
                    const labelName = issue.labels.length > 0 ? issue.labels[0].name : 'N/D';
                    const dataTitolo = issue.title.replace('Misurazione: ', '').trim();
                    
                    const matchMax = issue.body.match(/(?:MAX|Sistolica).*?(\d+)/i);
                    const matchMin = issue.body.match(/(?:MIN|Diastolica).*?(\d+)/i);
                    const matchBpm = issue.body.match(/(?:BPM|Battiti).*?(\d+)/i);

                    const max = matchMax ? parseInt(matchMax[1]) : 0;
                    const min = matchMin ? parseInt(matchMin[1]) : 0;
                    const bpm = matchBpm ? parseInt(matchBpm[1]) : 0;

                    if(max > 0 && min > 0) {
                        appData.push({ number: issue.number, data: dataTitolo, max, min, bpm, label: labelName, rawDate: new Date(issue.created_at) });
                        sumMax += max; sumMin += min; count++;
                    }

                    let color = labelName.includes('Alta') ? '#ff416c' : (labelName.includes('Bassa') ? '#F2C94C' : '#11998e');
                    
                    htmlContent += `
                    <div class="report-item" style="border-left-color: ${color}">
                        <span class="badge" style="background: ${color}20; color: ${color};">${labelName}</span>
                        <strong style="color: var(--text-main);">${dataTitolo}</strong><br>
                        <div style="margin-top: 5px; color: var(--text-muted); font-weight: 500;">
                            Sistolica: <b style="color:var(--text-main)">${max}</b> | Diastolica: <b style="color:var(--text-main)">${min}</b> ${bpm ? `| BPM: <b style="color:var(--text-main)">${bpm}</b>` : ''}
                        </div>
                    </div>`;
                });

                if (appData.length === 0) {
                    listaEl.innerHTML = '<div style="text-align:center; padding: 20px; color: var(--text-muted); font-weight:bold;">Archivio vuoto. Inizia a misurare!</div>';
                    document.getElementById('avg-max').innerText = '-';
                    document.getElementById('avg-min').innerText = '-';
                    if(chartInstance) chartInstance.destroy();
                    if(pieChartInstance) pieChartInstance.destroy();
                    return;
                }

                listaEl.innerHTML = htmlContent;
                document.getElementById('avg-max').innerText = Math.round(sumMax / count);
                document.getElementById('avg-min').innerText = Math.round(sumMin / count);

                appData.sort((a, b) => a.rawDate - b.rawDate);
                disegnaGrafico();

            } catch (error) {
                listaEl.innerHTML = '<div style="text-align:center; color: #ED213A; font-weight:bold;">❌ Impossibile caricare i dati.</div>';
            }
        }

        function disegnaGrafico() {
            const ctx = document.getElementById('myChart').getContext('2d');
            const ctxPie = document.getElementById('pieChart').getContext('2d');
            
            const labels = appData.map(d => d.data.split(',')[0]); 
            const dataMax = appData.map(d => d.max);
            const dataMin = appData.map(d => d.min);

            if(chartInstance) chartInstance.destroy(); 
            if(pieChartInstance) pieChartInstance.destroy();

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Sistolica (MAX)', data: dataMax, borderColor: '#ff416c', backgroundColor: 'rgba(255, 65, 108, 0.15)', tension: 0.4, fill: true, pointBackgroundColor: '#ff416c', pointRadius: 4, pointHoverRadius: 6 },
                        { label: 'Diastolica (MIN)', data: dataMin, borderColor: '#5B86E5', backgroundColor: 'rgba(91, 134, 229, 0.15)', tension: 0.4, fill: true, pointBackgroundColor: '#5B86E5', pointRadius: 4, pointHoverRadius: 6 }
                    ]
                },
                options: { 
                    responsive: true, 
                    plugins: { 
                        legend: { position: 'top', labels: { font: { weight: 'bold', family: "system-ui" } } },
                        datalabels: { display: false } 
                    },
                    scales: { 
                        y: { suggestedMin: 50, suggestedMax: 160, grid: { color: 'rgba(0,0,0,0.05)' } },
                        x: { grid: { display: false } }
                    }
                }
            });

            let countAlta = 0, countNormale = 0, countBassa = 0;
            appData.forEach(d => {
                if(d.label.includes('Alta')) countAlta++;
                else if(d.label.includes('Bassa')) countBassa++;
                else countNormale++;
            });

            pieChartInstance = new Chart(ctxPie, {
                type: 'doughnut',
                data: {
                    labels: ['Alta', 'Normale', 'Bassa'],
                    datasets: [{
                        data: [countAlta, countNormale, countBassa],
                        backgroundColor: ['#ff416c', '#11998e', '#F2C94C'],
                        borderWidth: 4,
                        borderColor: '#ffffff',
                        hoverOffset: 12
                    }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    cutout: '65%', 
                    plugins: { 
                        legend: { position: 'bottom', labels: { font: { weight: 'bold', family: "system-ui" } } },
                        datalabels: {
                            color: '#ffffff',
                            font: { weight: '900', size: 16, family: "system-ui" },
                            formatter: (value, context) => {
                                if (value === 0) return null;
                                let sum = 0;
                                let dataArr = context.chart.data.datasets[0].data;
                                dataArr.map(data => { sum += data; });
                                return Math.round((value * 100) / sum) + "%";
                            }
                        }
                    } 
                }
            });
        }

        async function azzeraArchivio() {
            if (appData.length === 0) return;
            const conferma = confirm("⚠️ ATTENZIONE: Sei sicuro di voler azzerare l'archivio? \nL'operazione chiuderà i record correnti e ripartirai da zero.");
            if (!conferma) return;

            const user = localStorage.getItem('gh_user');
            const repo = localStorage.getItem('gh_repo');
            const token = localStorage.getItem('gh_token');
            const listaEl = document.getElementById('lista-storico');

            listaEl.innerHTML = '<div style="text-align:center; padding: 20px; font-weight:bold;"><em>Azzeramento in corso... non chiudere l\'app. ⏳</em></div>';

            try {
                for (let record of appData) {
                    await fetch(`https://api.github.com/repos/${user}/${repo}/issues/${record.number}`, {
                        method: 'PATCH',
                        headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                        body: JSON.stringify({ state: 'closed' })
                    });
                }
                alert("✅ Archivio azzerato con successo!");
                caricaStorico();
            } catch (error) {
                alert("❌ Errore durante l'azzeramento.");
                caricaStorico();
            }
        }

        function scaricaPDF() {
            if(appData.length === 0) { alert("Nessun dato da esportare!"); return; }

            const btn = document.querySelector('.btn-export');
            btn.innerText = "⏳ Creazione PDF in corso...";

            setTimeout(() => {
                try {
                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF();

                    doc.setFontSize(22);
                    doc.setTextColor(255, 65, 108);
                    doc.text("Referto Medico - Andamento Pressorio", 105, 20, { align: "center" });
                    
                    doc.setFontSize(10);
                    doc.setTextColor(100, 100, 100);
                    doc.text(`Generato il: ${new Date().toLocaleDateString('it-IT')}`, 105, 28, { align: "center" });

                    doc.setFontSize(14);
                    doc.setTextColor(43, 45, 66);
                    doc.text("Riepilogo Generale", 14, 45);
                    
                    doc.setFontSize(12);
                    doc.setTextColor(50, 50, 50);
                    const avgMax = document.getElementById('avg-max').innerText;
                    const avgMin = document.getElementById('avg-min').innerText;
                    doc.text(`- Media Sistolica (MAX): ${avgMax}`, 14, 55);
                    doc.text(`- Media Diastolica (MIN): ${avgMin}`, 14, 62);
                    doc.text(`- Misurazioni Totali: ${appData.length}`, 14, 69);

                    // Sfondo bianco garantito per i canvas
                    const canvasLine = document.getElementById('myChart');
                    const canvasPie = document.getElementById('pieChart');
                    
                    // Creiamo canvas temporanei con sfondo bianco per evitare trasparenze nel PDF
                    const whiteCanvasLine = document.createElement('canvas');
                    whiteCanvasLine.width = canvasLine.width; whiteCanvasLine.height = canvasLine.height;
                    const wctxLine = whiteCanvasLine.getContext('2d');
                    wctxLine.fillStyle = '#ffffff'; wctxLine.fillRect(0, 0, whiteCanvasLine.width, whiteCanvasLine.height);
                    wctxLine.drawImage(canvasLine, 0, 0);

                    const whiteCanvasPie = document.createElement('canvas');
                    whiteCanvasPie.width = canvasPie.width; whiteCanvasPie.height = canvasPie.height;
                    const wctxPie = whiteCanvasPie.getContext('2d');
                    wctxPie.fillStyle = '#ffffff'; wctxPie.fillRect(0, 0, whiteCanvasPie.width, whiteCanvasPie.height);
                    wctxPie.drawImage(canvasPie, 0, 0);

                    const imgLine = whiteCanvasLine.toDataURL('image/jpeg', 1.0);
                    const imgPie = whiteCanvasPie.toDataURL('image/jpeg', 1.0);
                    
                    doc.addImage(imgLine, 'JPEG', 14, 80, 180, 80);
                    doc.addImage(imgPie, 'JPEG', 70, 165, 70, 70);

                    const tableData = [...appData].sort((a, b) => b.rawDate - a.rawDate).map(row => {
                        let labelPulita = row.label.replace(/[^a-zA-Z\s]/g, '').trim(); 
                        return [row.data, row.max, row.min, row.bpm, labelPulita];
                    });

                    doc.autoTable({
                        startY: 245,
                        head: [['Data e Ora', 'Sistolica', 'Diastolica', 'BPM', 'Esito']],
                        body: tableData,
                        theme: 'grid',
                        headStyles: { fillColor: [17, 153, 142] },
                        styles: { halign: 'center' }
                    });

                    doc.save(`Referto_Cardiologo_${new Date().toLocaleDateString('it-IT').replace(/\//g, '-')}.pdf`);
                    btn.innerText = "📄 Scarica PDF"; 

                } catch(error) {
                    alert("Errore nella generazione del PDF: " + error.message);
                    btn.innerText = "📄 Scarica PDF";
                }
            }, 500);
        }
    </script>
</body>
</html>
