<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Monitor Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#e63946">
    <link rel="apple-touch-icon" href="icona.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { --primary: #e63946; --secondary: #457b9d; --bg: #f8f9fa; --text: #1d3557; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; padding: 15px; max-width: 500px; margin: auto; background-color: var(--bg); color: var(--text); padding-bottom: 50px; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { margin: 0; font-size: 24px; color: var(--primary); }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #e9ecef; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input { width: 100%; padding: 12px; margin: 5px 0 15px 0; box-sizing: border-box; border: 1px solid #ced4da; border-radius: 8px; font-size: 16px; background: #fdfdfd; }
        button { width: 100%; padding: 14px; margin: 10px 0; background-color: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 2px 4px rgba(230, 57, 70, 0.3); }
        button:active { transform: scale(0.98); }
        .btn-secondary { background-color: var(--secondary); box-shadow: 0 2px 4px rgba(69, 123, 157, 0.3); }
        .btn-export { background-color: #2a9d8f; box-shadow: 0 2px 4px rgba(42, 157, 143, 0.3); }
        h2 { font-size: 18px; margin-top: 0; border-bottom: 2px solid #f1faee; padding-bottom: 10px; display: flex; align-items: center; gap: 8px;}
        #status { font-weight: bold; text-align: center; margin-top: 5px; font-size: 14px;}
        .report-item { border-left: 4px solid #ced4da; padding: 10px 15px; margin-bottom: 10px; background: #f8f9fa; border-radius: 0 8px 8px 0; font-size: 14px; }
        .badge { padding: 4px 8px; border-radius: 12px; font-weight: bold; font-size: 12px; float: right; }
        .stats-box { text-align: center; padding: 10px; background: #f1faee; border-radius: 8px; }
        .stats-box div { font-size: 24px; font-weight: bold; color: var(--text); }
        .stats-box span { font-size: 12px; color: #6c757d; text-transform: uppercase; }
        canvas { max-width: 100%; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>❤️ My Heart Monitor</h1>
    </div>

    <div class="card" id="config-card" style="display:none;">
        <h2>⚙️ Configurazione Iniziale</h2>
        <input type="text" id="username" placeholder="Username (es. marconeri70)">
        <input type="text" id="repo" placeholder="Repo (es. my-heart-monitor)">
        <input type="password" id="token" placeholder="Token GitHub">
        <button class="btn-secondary" onclick="salvaImpostazioni()">Salva Impostazioni</button>
    </div>

    <div class="card">
        <h2>📝 Nuova Misurazione</h2>
        <div class="grid-2">
            <div>
                <label>Sistolica (MAX)</label>
                <input type="number" id="sis" placeholder="es. 120">
            </div>
            <div>
                <label>Diastolica (MIN)</label>
                <input type="number" id="dia" placeholder="es. 80">
            </div>
        </div>
        <label>Battiti (BPM)</label>
        <input type="number" id="bpm" placeholder="es. 70">
        <button onclick="inviaDati()">Salva Dati</button>
        <p id="status"></p>
    </div>

    <div class="card">
        <h2>📈 Analisi e Andamento</h2>
        <div class="grid-2" id="medie-box" style="margin-bottom: 15px;">
            <div class="stats-box"><span>Media MAX</span><div id="avg-max">-</div></div>
            <div class="stats-box"><span>Media MIN</span><div id="avg-min">-</div></div>
        </div>
        <canvas id="myChart"></canvas>
    </div>

    <div class="card">
        <h2>📋 Archivio Dati</h2>
        <button class="btn-secondary" onclick="caricaStorico()">🔄 Aggiorna Dati</button>
        <button class="btn-export" onclick="scaricaCSV()">📥 Scarica Report Medico</button>
        <div id="lista-storico" style="margin-top: 15px;"></div>
    </div>

    <script>
        let appData = []; // Variabile globale per salvare i dati scaricati
        let chartInstance = null;

        window.onload = () => {
            const user = localStorage.getItem('gh_user');
            if(!user) {
                document.getElementById('config-card').style.display = 'block';
            } else {
                caricaStorico(); // Carica in automatico all'apertura
            }
        };

        function salvaImpostazioni() {
            localStorage.setItem('gh_user', document.getElementById('username').value.trim());
            localStorage.setItem('gh_repo', document.getElementById('repo').value.trim());
            localStorage.setItem('gh_token', document.getElementById('token').value.trim());
            document.getElementById('config-card').style.display = 'none';
            caricaStorico();
        }

        async function inviaDati() {
            const user = localStorage.getItem('gh_user');
            const repo = localStorage.getItem('gh_repo');
            const token = localStorage.getItem('gh_token');
            const sis = parseInt(document.getElementById('sis').value);
            const dia = parseInt(document.getElementById('dia').value);
            const bpm = parseInt(document.getElementById('bpm').value) || 0;
            const statusEl = document.getElementById('status');

            if (!user || !repo || !token) { statusEl.innerText = '⚠️ Configurazione mancante.'; return; }
            if (!sis || !dia) { statusEl.innerText = '⚠️ Inserisci MAX e MIN.'; return; }

            statusEl.innerText = '⏳ Salvataggio in corso...';
            let label = "🟢 Normale";
            if (sis >= 135 || dia >= 85) label = "🔴 Alta";
            else if (sis <= 90 || dia <= 60) label = "🟡 Bassa";

            const data = new Date();
            const titolo = `Misurazione: ${data.toLocaleString('it-IT')}`;
            const corpo = `MAX: ${sis} | MIN: ${dia} | BPM: ${bpm}`;

            try {
                const response = await fetch(`https://api.github.com/repos/${user}/${repo}/issues`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: titolo, body: corpo, labels: [label] })
                });

                if (response.ok) {
                    statusEl.style.color = 'green';
                    statusEl.innerText = '✅ Dato Salvato!';
                    document.getElementById('sis').value = ''; document.getElementById('dia').value = ''; document.getElementById('bpm').value = '';
                    setTimeout(() => { statusEl.innerText = ''; }, 3000);
                    caricaStorico(); // Aggiorna grafico e lista
                } else {
                    statusEl.innerText = `❌ Errore API`;
                }
            } catch (error) { statusEl.innerText = `❌ Errore di rete`; }
        }

        async function caricaStorico() {
            const user = localStorage.getItem('gh_user');
            const repo = localStorage.getItem('gh_repo');
            const token = localStorage.getItem('gh_token');
            const listaEl = document.getElementById('lista-storico');

            if (!user || !repo || !token) return;
            listaEl.innerHTML = '<em>Sincronizzazione... ⏳</em>';

            try {
                const response = await fetch(`https://api.github.com/repos/${user}/${repo}/issues?state=all&per_page=100`, {
                    headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github.v3+json' }
                });
                
                if (!response.ok) throw new Error("Errore API");
                const issues = await response.json();

                appData = []; // Reset dati
                let htmlContent = '';
                let sumMax = 0, sumMin = 0, count = 0;

                // Estrazione dati intelligente (legge sia dal vecchio formato che dal nuovo)
                issues.forEach(issue => {
                    if (issue.pull_request) return; // Salta le pull request
                    
                    const labelName = issue.labels.length > 0 ? issue.labels[0].name : 'N/D';
                    const dataTitolo = issue.title.replace('Misurazione: ', '').trim();
                    
                    // Regex per estrarre i numeri dal corpo (robusto)
                    const matchMax = issue.body.match(/(?:MAX|Sistolica).*?(\d+)/i);
                    const matchMin = issue.body.match(/(?:MIN|Diastolica).*?(\d+)/i);
                    const matchBpm = issue.body.match(/(?:BPM|Battiti).*?(\d+)/i);

                    const max = matchMax ? parseInt(matchMax[1]) : 0;
                    const min = matchMin ? parseInt(matchMin[1]) : 0;
                    const bpm = matchBpm ? parseInt(matchBpm[1]) : 0;

                    if(max > 0 && min > 0) {
                        appData.push({ data: dataTitolo, max, min, bpm, label: labelName, rawDate: new Date(issue.created_at) });
                        sumMax += max; sumMin += min; count++;
                    }

                    let color = labelName.includes('Alta') ? '#e63946' : (labelName.includes('Bassa') ? '#e9c46a' : '#2a9d8f');
                    
                    htmlContent += `
                    <div class="report-item" style="border-left-color: ${color}">
                        <span class="badge" style="background: ${color}20; color: ${color};">${labelName}</span>
                        <strong>${dataTitolo}</strong><br>
                        Sistolica: <b>${max}</b> | Diastolica: <b>${min}</b> ${bpm ? `| BPM: <b>${bpm}</b>` : ''}
                    </div>`;
                });

                listaEl.innerHTML = htmlContent || 'Nessun dato registrato.';
                
                // Aggiorna Medie
                if(count > 0) {
                    document.getElementById('avg-max').innerText = Math.round(sumMax / count);
                    document.getElementById('avg-min').innerText = Math.round(sumMin / count);
                }

                // Ordina dal più vecchio al più nuovo per il grafico
                appData.sort((a, b) => a.rawDate - b.rawDate);
                disegnaGrafico();

            } catch (error) {
                listaEl.innerHTML = '❌ Impossibile caricare i dati.';
            }
        }

        function disegnaGrafico() {
            const ctx = document.getElementById('myChart').getContext('2d');
            const labels = appData.map(d => d.data.split(',')[0]); // Solo la data, no ora
            const dataMax = appData.map(d => d.max);
            const dataMin = appData.map(d => d.min);

            if(chartInstance) chartInstance.destroy(); // Distrugge il vecchio grafico prima di ricrearlo

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Sistolica (MAX)', data: dataMax, borderColor: '#e63946', backgroundColor: '#e63946', tension: 0.3, fill: false },
                        { label: 'Diastolica (MIN)', data: dataMin, borderColor: '#457b9d', backgroundColor: '#457b9d', tension: 0.3, fill: false }
                    ]
                },
                options: {
                    responsive: true,
                    scales: { y: { beginAtZero: false } },
                    plugins: { legend: { position: 'top' } }
                }
            });
        }

        // --- FUNZIONE PER IL CARDIOLOGO ---
        function scaricaCSV() {
            if(appData.length === 0) { alert("Nessun dato da esportare!"); return; }
            
            let csvContent = "Data e Ora,Sistolica (MAX),Diastolica (MIN),Battiti (BPM),Esito\n";
            
            // Ordina dal più recente al più vecchio per il report
            const exportData = [...appData].sort((a, b) => b.rawDate - a.rawDate);
            
            exportData.forEach(row => {
                csvContent += `"${row.data}",${row.max},${row.min},${row.bpm},"${row.label}"\n`;
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `Report_Pressione_${new Date().toLocaleDateString('it-IT').replace(/\//g, '-')}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
