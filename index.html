<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Monitor Pro Max</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#e63946">
    <link rel="apple-touch-icon" href="icona.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { 
            --primary: #e63946; --secondary: #457b9d; 
            --bg: #f8f9fa; --surface: #ffffff; --text: #1d3557; 
            --border: #e9ecef; --input-bg: #fdfdfd; 
            --box-shadow: rgba(0,0,0,0.05);
            --normale: #2a9d8f; --alta: #e63946; --bassa: #e9c46a;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #121212; --surface: #1e1e1e; --text: #e0e0e0; 
                --border: #333333; --input-bg: #2c2c2c; 
                --box-shadow: rgba(0,0,0,0.5);
            }
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; padding: 15px; max-width: 500px; margin: auto; background-color: var(--bg); color: var(--text); padding-bottom: 50px; transition: background-color 0.3s; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { margin: 0; font-size: 24px; color: var(--primary); }
        .card { background: var(--surface); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px var(--box-shadow); margin-bottom: 20px; border: 1px solid var(--border); transition: background-color 0.3s; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input { width: 100%; padding: 12px; margin: 5px 0 15px 0; box-sizing: border-box; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; background: var(--input-bg); color: var(--text); }
        button { width: 100%; padding: 14px; margin: 10px 0; background-color: var(--primary); color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 2px 4px rgba(230, 57, 70, 0.3); }
        button:active { transform: scale(0.98); }
        button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-secondary { background-color: var(--secondary); box-shadow: 0 2px 4px rgba(69, 123, 157, 0.3); }
        .btn-export { background-color: var(--normale); box-shadow: 0 2px 4px rgba(42, 157, 143, 0.3); margin-top:0;}
        .btn-danger { background-color: #d90429; box-shadow: 0 2px 4px rgba(217, 4, 41, 0.3); margin-top:0;}
        h2 { font-size: 18px; margin-top: 0; border-bottom: 2px solid var(--border); padding-bottom: 10px; display: flex; align-items: center; gap: 8px;}
        #status { font-weight: bold; text-align: center; margin-top: 5px; font-size: 14px;}
        .report-item { border-left: 4px solid var(--border); padding: 12px 15px; margin-bottom: 10px; background: var(--bg); border-radius: 0 8px 8px 0; font-size: 14px; position: relative;}
        .badge { padding: 4px 8px; border-radius: 12px; font-weight: bold; font-size: 12px; float: right; }
        .stats-box { text-align: center; padding: 10px; background: var(--bg); border-radius: 8px; border: 1px solid var(--border); }
        .stats-box div { font-size: 24px; font-weight: bold; color: var(--text); }
        .stats-box span { font-size: 12px; color: #888; text-transform: uppercase; }
        .trend { font-size: 12px; font-weight: bold; margin-top: 5px; display: inline-block; padding: 2px 6px; border-radius: 4px; background: var(--surface); border: 1px solid var(--border);}
        .trend.up-bad { color: var(--alta); }
        .trend.down-good { color: var(--normale); }
        .trend.up-good { color: var(--normale); }
        .trend.down-bad { color: var(--bassa); }
        .trend.flat { color: #888; }
        canvas { max-width: 100%; margin-top: 15px; background: var(--surface); border-radius: 8px; padding: 10px; box-sizing: border-box;}
    </style>
</head>
<body>

    <div class="header">
        <h1>❤️ Heart Monitor Pro</h1>
    </div>

    <div class="card" id="config-card" style="display:none;">
        <h2>⚙️ Configurazione</h2>
        <input type="text" id="username" placeholder="Username (es. marconeri70)">
        <input type="text" id="repo" placeholder="Repo (es. my-heart-monitor)">
        <input type="password" id="token" placeholder="Token GitHub">
        <button class="btn-secondary" onclick="salvaImpostazioni()">Salva Impostazioni</button>
    </div>

    <div class="card">
        <h2>📝 Nuova Misurazione</h2>
        <div class="grid-2">
            <div>
                <label style="font-size: 12px; font-weight: bold; color: #888;">Sistolica (MAX)</label>
                <input type="number" id="sis" placeholder="es. 120">
            </div>
            <div>
                <label style="font-size: 12px; font-weight: bold; color: #888;">Diastolica (MIN)</label>
                <input type="number" id="dia" placeholder="es. 80">
            </div>
        </div>
        <label style="font-size: 12px; font-weight: bold; color: #888;">Battiti (BPM)</label>
        <input type="number" id="bpm" placeholder="es. 70">
        <button id="btn-salva" onclick="inviaDati()">Salva Dati</button>
        <p id="status"></p>
    </div>

    <div class="card">
        <h2>📈 Dashboard Salute</h2>
        <div class="grid-2" style="margin-bottom: 15px;">
            <div class="stats-box"><span>Media MAX</span><div id="avg-max">-</div></div>
            <div class="stats-box"><span>Media MIN</span><div id="avg-min">-</div></div>
        </div>
        
        <h3 style="font-size: 14px; color: #888; text-align: center; margin-bottom: 0;">Andamento nel tempo</h3>
        <canvas id="lineChart"></canvas>
        
        <h3 style="font-size: 14px; color: #888; text-align: center; margin-top: 25px; margin-bottom: 0;">Distribuzione Valori</h3>
        <canvas id="pieChart" style="max-height: 200px;"></canvas>
    </div>

    <div class="card">
        <h2>📋 Archivio con Tendenze</h2>
        <button id="btn-sync" class="btn-secondary" onclick="caricaStorico()">🔄 Sincronizza Dati</button>
        
        <div class="grid-2" style="margin-top: 10px;">
            <button class="btn-export" onclick="scaricaWord()">📄 Esporta Medico</button>
            <button class="btn-danger" onclick="azzeraArchivio()">🗑️ Azzera Tutto</button>
        </div>

        <div id="lista-storico" style="margin-top: 15px;"></div>
    </div>

    <script>
        let appData = []; 
        let lineChartInstance = null;
        let pieChartInstance = null;

        window.onload = () => {
            const user = localStorage.getItem('gh_user');
            if(!user) document.getElementById('config-card').style.display = 'block';
            else caricaStorico();
        };

        function salvaImpostazioni() {
            localStorage.setItem('gh_user', document.getElementById('username').value.trim());
            localStorage.setItem('gh_repo', document.getElementById('repo').value.trim());
            localStorage.setItem('gh_token', document.getElementById('token').value.trim());
            document.getElementById('config-card').style.display = 'none';
            caricaStorico();
        }

        async function inviaDati() {
            const user = localStorage.getItem('gh_user');
            const repo = localStorage.getItem('gh_repo');
            const token = localStorage.getItem('gh_token');
            const sis = parseInt(document.getElementById('sis').value);
            const dia = parseInt(document.getElementById('dia').value);
            const bpm = parseInt(document.getElementById('bpm').value) || 0;
            const statusEl = document.getElementById('status');
            const btnSalva = document.getElementById('btn-salva');

            if (!user || !repo || !token) { statusEl.innerText = '⚠️ Configurazione mancante.'; return; }
            if (!sis || !dia) { statusEl.innerText = '⚠️ Inserisci MAX e MIN.'; return; }

            // Blocca il pulsante per evitare invii doppi
            btnSalva.disabled = true;
            btnSalva.innerText = '⏳ Invio in corso...';
            statusEl.innerText = '';

            let label = "🟢 Normale";
            if (sis >= 135 || dia >= 85) label = "🔴 Alta";
            else if (sis <= 90 || dia <= 60) label = "🟡 Bassa";

            const data = new Date();
            const titolo = `Misurazione: ${data.toLocaleString('it-IT')}`;
            const corpo = `MAX: ${sis} | MIN: ${dia} | BPM: ${bpm}`;

            try {
                const response = await fetch(`https://api.github.com/repos/${user}/${repo}/issues`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: titolo, body: corpo, labels: [label] })
                });

                if (response.ok) {
                    statusEl.style.color = '#2a9d8f';
                    statusEl.innerText = '✅ Salvato!';
                    document.getElementById('sis').value = ''; document.getElementById('dia').value = ''; document.getElementById('bpm').value = '';
                    setTimeout(() => { statusEl.innerText = ''; }, 3000);
                    await caricaStorico(); // Ricarica lo storico automaticamente
                } else { statusEl.innerText = `❌ Errore API`; }
            } catch (error) { 
                statusEl.innerText = `❌ Errore di Rete`; 
            } finally {
                // Sblocca il pulsante
                btnSalva.disabled = false;
                btnSalva.innerText = 'Salva Dati';
            }
        }

        async function caricaStorico() {
            const user = localStorage.getItem('gh_user');
            const repo = localStorage.getItem('gh_repo');
            const token = localStorage.getItem('gh_token');
            const listaEl = document.getElementById('lista-storico');
            const btnSync = document.getElementById('btn-sync');

            if (!user || !token) return;
            
            // Blocca il pulsante e mostra il caricamento
            btnSync.disabled = true;
            btnSync.innerText = '⏳ Sincronizzazione...';
            listaEl.innerHTML = '<em>Scaricamento dati freschi da GitHub... ⏳</em>';

            try {
                // IL TRUCCHETTO: Aggiungiamo il timestamp corrente (?t=...) per ingannare la cache del browser!
                const timestamp = new Date().getTime();
                const response = await fetch(`https://api.github.com/repos/${user}/${repo}/issues?state=open&per_page=100&t=${timestamp}`, {
                    headers: { 
                        'Authorization': `Bearer ${token}`, 
                        'Accept': 'application/vnd.github.v3+json',
                        'Cache-Control': 'no-cache, no-store, must-revalidate', // Forza il ricaricamento
                        'Pragma': 'no-cache'
                    }
                });
                
                if (!response.ok) throw new Error("Errore API");
                const issues = await response.json();

                appData = []; 
                let sumMax = 0, sumMin = 0;
                let conteggio = { normale: 0, alta: 0, bassa: 0 };

                issues.forEach(issue => {
                    if (issue.pull_request) return; 
                    const labelName = issue.labels.length > 0 ? issue.labels[0].name : 'N/D';
                    const dataTitolo = issue.title.replace('Misurazione: ', '').trim();
                    
                    const matchMax = issue.body.match(/(?:MAX|Sistolica).*?(\d+)/i);
                    const matchMin = issue.body.match(/(?:MIN|Diastolica).*?(\d+)/i);
                    const matchBpm = issue.body.match(/(?:BPM|Battiti).*?(\d+)/i);

                    const max = matchMax ? parseInt(matchMax[1]) : 0;
                    const min = matchMin ? parseInt(matchMin[1]) : 0;
                    const bpm = matchBpm ? parseInt(matchBpm[1]) : 0;

                    if(max > 0 && min > 0) {
                        appData.push({ number: issue.number, data: dataTitolo, max, min, bpm, label: labelName, rawDate: new Date(issue.created_at) });
                        sumMax += max; sumMin += min;
                        
                        if (labelName.includes('Alta')) conteggio.alta++;
                        else if (labelName.includes('Bassa')) conteggio.bassa++;
                        else conteggio.normale++;
                    }
                });

                if (appData.length === 0) {
                    listaEl.innerHTML = 'Nessuna misurazione trovata. Inizia a misurare!';
                    document.getElementById('avg-max').innerText = '-';
                    document.getElementById('avg-min').innerText = '-';
                    if(lineChartInstance) lineChartInstance.destroy();
                    if(pieChartInstance) pieChartInstance.destroy();
                    btnSync.disabled = false;
                    btnSync.innerText = '🔄 Sincronizza Dati';
                    return;
                }

                appData.sort((a, b) => b.rawDate - a.rawDate);
                
                let htmlContent = '';
                appData.forEach((row, index) => {
                    let color = row.label.includes('Alta') ? 'var(--alta)' : (row.label.includes('Bassa') ? 'var(--bassa)' : 'var(--normale)');
                    
                    let trendHTML = '';
                    if (index < appData.length - 1) {
                        const prev = appData[index + 1];
                        const diffMax = row.max - prev.max;
                        
                        if (diffMax > 0) {
                            let cl = row.max >= 135 ? 'up-bad' : 'up-good';
                            trendHTML = `<span class="trend ${cl}">MAX ↑ +${diffMax}</span>`;
                        } else if (diffMax < 0) {
                            let cl = row.max <= 90 ? 'down-bad' : 'down-good';
                            trendHTML = `<span class="trend ${cl}">MAX ↓ ${diffMax}</span>`;
                        } else {
                            trendHTML = `<span class="trend flat">MAX =</span>`;
                        }
                    }

                    htmlContent += `
                    <div class="report-item" style="border-left-color: ${color}">
                        <span class="badge" style="background: ${color}20; color: ${color};">${row.label}</span>
                        <strong>${row.data}</strong><br>
                        Sistolica: <b>${row.max}</b> | Diastolica: <b>${row.min}</b> ${row.bpm ? `| BPM: <b>${row.bpm}</b>` : ''}
                        <div style="margin-top: 5px;">${trendHTML}</div>
                    </div>`;
                });

                listaEl.innerHTML = htmlContent;
                document.getElementById('avg-max').innerText = Math.round(sumMax / appData.length);
                document.getElementById('avg-min').innerText = Math.round(sumMin / appData.length);

                disegnaGrafici(conteggio);

            } catch (error) { 
                listaEl.innerHTML = '❌ Errore caricamento.'; 
            } finally {
                // Sblocca il pulsante alla fine
                btnSync.disabled = false;
                btnSync.innerText = '🔄 Sincronizza Dati';
            }
        }

        function disegnaGrafici(conteggio) {
            const chartData = [...appData].reverse();
            const labels = chartData.map(d => d.data.split(',')[0]); 
            const dataMax = chartData.map(d => d.max);
            const dataMin = chartData.map(d => d.min);

            const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            const gridColor = isDark ? '#333' : '#e9ecef';
            const textColor = isDark ? '#e0e0e0' : '#1d3557';

            Chart.defaults.color = textColor;

            const ctxLine = document.getElementById('lineChart').getContext('2d');
            if(lineChartInstance) lineChartInstance.destroy(); 
            lineChartInstance = new Chart(ctxLine, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'MAX', data: dataMax, borderColor: '#e63946', backgroundColor: '#e63946', tension: 0.3 },
                        { label: 'MIN', data: dataMin, borderColor: '#457b9d', backgroundColor: '#457b9d', tension: 0.3 }
                    ]
                },
                options: { animation: { duration: 0 }, scales: { x: { grid: { color: gridColor } }, y: { grid: { color: gridColor } } } }
            });

            const ctxPie = document.getElementById('pieChart').getContext('2d');
            if(pieChartInstance) pieChartInstance.destroy();
            pieChartInstance = new Chart(ctxPie, {
                type: 'doughnut',
                data: {
                    labels: ['Normale', 'Alta', 'Bassa'],
                    datasets: [{
                        data: [conteggio.normale, conteggio.alta, conteggio.bassa],
                        backgroundColor: ['#2a9d8f', '#e63946', '#e9c46a'],
                        borderWidth: 0
                    }]
                },
                options: { plugins: { legend: { position: 'bottom' } }, cutout: '70%' }
            });
        }

        async function azzeraArchivio() {
            if (appData.length === 0) return;
            const conferma = confirm("⚠️ ATTENZIONE: Sei sicuro di voler azzerare l'archivio? \nL'operazione chiuderà i record correnti e ripartirai da zero.");
            if (!conferma) return;

            const user = localStorage.getItem('gh_user');
            const repo = localStorage.getItem('gh_repo');
            const token = localStorage.getItem('gh_token');
            const listaEl = document.getElementById('lista-storico');

            listaEl.innerHTML = '<em>Azzeramento in corso... non chiudere l\'app. ⏳</em>';

            try {
                for (let record of appData) {
                    await fetch(`https://api.github.com/repos/${user}/${repo}/issues/${record.number}`, {
                        method: 'PATCH',
                        headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                        body: JSON.stringify({ state: 'closed' })
                    });
                }
                alert("✅ Archivio azzerato con successo!");
                caricaStorico(); 
            } catch (error) {
                alert("❌ Errore durante l'azzeramento.");
                caricaStorico();
            }
        }

        function scaricaWord() {
            if(appData.length === 0) return;
            
            const canvas = document.getElementById('lineChart');
            const imgData = canvas.toDataURL('image/png');
            let tableHTML = `<table border="1" cellpadding="8" cellspacing="0" style="width: 100%; border-collapse: collapse; text-align: center;"><tr style="background-color: #f1faee;"><th>Data</th><th>MAX</th><th>MIN</th><th>BPM</th><th>Esito</th></tr>`;
            
            appData.forEach(row => {
                let colColor = row.label.includes('Alta') ? '#e63946' : (row.label.includes('Bassa') ? '#e9c46a' : '#2a9d8f');
                tableHTML += `<tr><td>${row.data}</td><td><b>${row.max}</b></td><td><b>${row.min}</b></td><td>${row.bpm}</td><td style="color: ${colColor}; font-weight: bold;">${row.label}</td></tr>`;
            });
            tableHTML += `</table>`;

            const avgMax = document.getElementById('avg-max').innerText;
            const avgMin = document.getElementById('avg-min').innerText;
            
            const content = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                <head><meta charset='utf-8'><title>Report Pressione</title></head>
                <body style="font-family: Arial;">
                    <h1 style="color: #e63946; text-align: center;">Report Medico</h1>
                    <p>Generato il: ${new Date().toLocaleDateString('it-IT')} | <b>Media MAX:</b> ${avgMax} | <b>Media MIN:</b> ${avgMin}</p>
                    <div style="text-align: center;"><img src="${imgData}" style="max-width: 600px;"></div><br>
                    ${tableHTML}
                </body></html>`;

            const blob = new Blob(['\ufeff', content], { type: 'application/msword' });
            const link = document.createElement("a"); link.href = URL.createObjectURL(blob);
            link.download = `Report_Pressione.doc`; document.body.appendChild(link); link.click(); document.body.removeChild(link);
        }
    </script>
</body>
</html>
